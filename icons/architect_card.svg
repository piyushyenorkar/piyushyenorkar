<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 850 300" width="850" height="300">
  <defs>
    <!-- Background Gradient for Box 1 (Core Identity) -->
    <linearGradient id="bg1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#12c2e9" stop-opacity="0.15"/>
      <stop offset="50%" stop-color="#c471ed" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#f64f59" stop-opacity="0.15"/>
    </linearGradient>
    <linearGradient id="border1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#12c2e9" stop-opacity="0.8"/>
      <stop offset="50%" stop-color="#c471ed" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#f64f59" stop-opacity="0.8"/>
    </linearGradient>

    <!-- Background Gradient for Box 2 (Achievements) -->
    <linearGradient id="bg2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f12711" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#f5af19" stop-opacity="0.2"/>
    </linearGradient>
    <linearGradient id="border2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f12711" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#f5af19" stop-opacity="0.8"/>
    </linearGradient>

    <!-- Base Drop Shadow -->
    <filter id="shadow" x="-5%" y="-5%" width="110%" height="110%">
      <feDropShadow dx="0" dy="6" stdDeviation="6" flood-color="#000000" flood-opacity="0.4"/>
    </filter>
  </defs>

  <style>
    .title { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; font-size: 24px; font-weight: 800; fill: #ffffff; letter-spacing: 0.5px; }
    .label { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; font-size: 16px; font-weight: 700; fill: #e5e5e5; }
    .value { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; font-size: 16px; font-weight: 400; fill: #a3b3bc; }
    .ach-title { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; font-size: 17px; font-weight: 700; fill: #ffffff; }
  </style>

  <!-- Box 1: Core Identity -->
  <g filter="url(#shadow)">
    <rect x="15" y="15" width="490" height="270" rx="20" fill="url(#bg1)" stroke="url(#border1)" stroke-width="2"/>
  </g>
  
  <text x="45" y="60" class="title">👨‍💻 Core Identity</text>
  
  <!-- Content for Box 1 -->
  <g transform="translate(45, 105)">
    <text y="0"><tspan class="label">Name:</tspan> <tspan class="value">Piyush Yenorkar</tspan></text>
    <text y="35"><tspan class="label">Education:</tspan> <tspan class="value">CE @ Saraswati College of Engineering</tspan></text>
    <text y="70"><tspan class="label">Location:</tspan> <tspan class="value">Navi Mumbai, India 🇮🇳</tspan></text>
    <text y="105"><tspan class="label">Current Focus:</tspan> <tspan class="value">Co-leading STARCY &amp; Building PLUTO</tspan></text>
    <text y="140"><tspan class="label">Mission:</tspan> <tspan class="value" font-style="italic">Equal access to growth and opportunity</tspan></text>
    <text y="165"><tspan class="value" font-style="italic">for every student.</tspan></text>
  </g>

  <!-- Box 2: Achievements -->
  <g filter="url(#shadow)">
    <rect x="525" y="15" width="310" height="270" rx="20" fill="url(#bg2)" stroke="url(#border2)" stroke-width="2"/>
  </g>

  <text x="555" y="60" class="title">🌟 Achievements</text>

  <!-- Trophy Icon -->
  <g transform="translate(550, 100) scale(1.1)">
    <!-- Base -->
    <path fill="#e6a822" d="M8,24 h14 v4 h-14 z"/>
    <path fill="#f2c94c" d="M11,20 h8 v4 h-8 z"/>
    <!-- Cup -->
    <path fill="#f2c94c" d="M5,4 h20 c0,10 -5,16 -10,16 c-5,0 -10,-6 -10,-16 z"/>
    <path fill="#f2994a" d="M15,4 h10 c0,10 -5,16 -10,16 v-16 z"/>
    <!-- Handles -->
    <path fill="none" stroke="#f2c94c" stroke-width="3" d="M5,6 c-4,0 -4,8 0,8"/>
    <path fill="none" stroke="#f2994a" stroke-width="3" d="M25,6 c4,0 4,8 0,8"/>
    <!-- Star Highlight -->
    <polygon fill="#ffffff" points="12,8 13.5,12 18,12 14.5,15 15.5,19 12,16.5 8.5,19 9.5,15 6,12 10.5,12"/>
  </g>
  <text x="595" y="115" class="ach-title">1st Place in Axion</text>
  <text x="595" y="135" class="ach-title">Hackathon</text>

  <!-- Palette Icon -->
  <g transform="translate(550, 190) scale(1.2)">
    <!-- Board -->
    <path fill="#d2b48c" d="M15,2 c7.5,0 13,5.5 13,13 c0,7.5 -6.5,9 -10,9 c-2,0 -3,-1 -3,-3 c0,-1.5 1,-2 1,-3 c0,-2 -2,-4 -4,-4 c-6,0 -9,-5 -9,-10 c0,-6.5 5.5,-12 12,-12 z"/>
    <!-- Thumb hole -->
    <circle cx="21" cy="20" r="2.5" fill="#0d1117"/>
    <!-- Paint Blobs -->
    <circle cx="10" cy="7" r="2.5" fill="#ff5252"/>
    <circle cx="16" cy="6" r="2.5" fill="#448aff"/>
    <circle cx="22" cy="9" r="2.5" fill="#69f0ae"/>
    <circle cx="8" cy="13" r="2.5" fill="#ffd740"/>
  </g>
  <text x="595" y="210" class="ach-title">Multi-Gold Medalist</text>
  <text x="595" y="230" class="ach-title">in Art &amp; Sketching</text>
</svg>
