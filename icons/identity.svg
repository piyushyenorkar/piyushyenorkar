<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 40 40" width="40" height="40">
  <!-- ID Card Base representing Identity -->
  <rect x="5" y="8" width="30" height="24" rx="3" fill="#6272a4"/>
  <rect x="5" y="14" width="30" height="18" fill="#44475a"/>
  
  <!-- Lanyard hole and clip -->
  <rect x="15" y="5" width="10" height="4" rx="2" fill="#ff79c6"/>
  <circle cx="20" cy="10" r="1.5" fill="#282a36"/>
  
  <!-- Profile Picture Silhouette -->
  <circle cx="13" cy="22" r="5" fill="#8be9fd"/>
  <circle cx="13" cy="20" r="2.5" fill="#282a36"/>
  <path fill="#282a36" d="M9,26 c0,-3 2,-4 4,-4 c2,0 4,1 4,4 z"/>

  <!-- Text lines on ID card -->
  <rect x="21" y="18" width="10" height="2" rx="1" fill="#f8f8f2"/>
  <rect x="21" y="22" width="8" height="2" rx="1" fill="#f8f8f2"/>
  <rect x="21" y="26" width="6" height="2" rx="1" fill="#f1fa8c"/>
</svg>
