<svg width="800" height="300" viewBox="0 0 800 300" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@400;700&amp;display=swap');
      .title { font-family: 'Outfit', sans-serif; font-size: 48px; font-weight: 700; fill: #ffffff; }
      .subtitle { font-family: 'Outfit', sans-serif; font-size: 24px; font-weight: 400; fill: #a0aec0; }
      .text-small { font-family: 'Outfit', sans-serif; font-size: 16px; font-weight: 400; fill: #8b949e; }
      @keyframes float1 {
        0% { transform: translate(0, 0); }
        50% { transform: translate(20px, -20px); }
        100% { transform: translate(0, 0); }
      }
      @keyframes float2 {
        0% { transform: translate(0, 0); }
        50% { transform: translate(-20px, 20px); }
        100% { transform: translate(0, 0); }
      }
      .blob1 { animation: float1 8s ease-in-out infinite; }
      .blob2 { animation: float2 10s ease-in-out infinite; }
    </style>
    <filter id="blur" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="40" />
    </filter>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FF0080;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#7928CA;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="grad2" x1="100%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#00DFD8;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#007CF0;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="100%" height="100%" fill="#0d1117" />
  
  <!-- Glowing Animated Blobs -->
  <circle class="blob1" cx="200" cy="150" r="150" fill="url(#grad1)" filter="url(#blur)" opacity="0.5"/>
  <circle class="blob2" cx="600" cy="200" r="180" fill="url(#grad2)" filter="url(#blur)" opacity="0.4"/>

  <!-- Glassmorphism Card -->
  <rect x="40" y="40" width="720" height="220" rx="24" fill="rgba(255, 255, 255, 0.05)" stroke="rgba(255, 255, 255, 0.1)" stroke-width="1.5" />
  
  <!-- Text Content -->
  <text x="80" y="110" class="title">Hi, I'm Piyush 👋</text>
  <text x="80" y="160" class="subtitle">Full Stack Dev &amp; AI/ML Enthusiast</text>
  <text x="80" y="210" class="text-small">Co-leading Team STARCY | Building PLUTO</text>
  <text x="80" y="235" class="text-small">Award-winning Artist 🎨 | Hackathon Winner 🏆</text>
</svg>
